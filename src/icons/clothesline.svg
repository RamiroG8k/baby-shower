<svg
  viewBox="0 0 400 220"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
>
  <style>
    .clothesline {
      width: 100%;
      height: auto;
      margin: 0 auto;
    }
    .sway-element {
      transform-origin: center top;
      animation: clothesSway 4s ease-in-out infinite;
    }
    @keyframes clothesSway {
      0%, 100% { transform: rotate(-1.5deg); }
      50% { transform: rotate(1.5deg); }
    }
  </style>
  <path
    d="M30 30 Q100 50 200 38 Q300 26 370 42"
    stroke="var(--outline-variant)"
    stroke-width="2"
    stroke-linecap="round"
    fill="none"
  />

  <g transform="translate(55, 28) rotate(-15)" class="sway-element" style="animation-delay: 0.2s;">
    <path d="M0 0 Q-4 12 -2 28" stroke="var(--primary-container)" stroke-width="1.5" fill="none" />
    <ellipse cx="-6" cy="8" rx="5" ry="3.5" fill="var(--primary-container)" opacity="0.7" transform="rotate(-30)" />
    <ellipse cx="-4" cy="16" rx="5" ry="3.5" fill="var(--primary-container)" opacity="0.6" transform="rotate(-20)" />
    <ellipse cx="-2" cy="24" rx="4" ry="3" fill="var(--primary-container)" opacity="0.5" transform="rotate(-10)" />
    <ellipse cx="4" cy="11" rx="5" ry="3.5" fill="var(--primary-container)" opacity="0.65" transform="rotate(25)" />
    <ellipse cx="3" cy="19" rx="4.5" ry="3" fill="var(--primary-container)" opacity="0.55" transform="rotate(15)" />
  </g>

  <g transform="translate(100, 36)">
    <rect x="-3" y="-6" width="6" height="14" rx="1.5" fill="var(--outline)" opacity="0.5" />
  </g>

  <g transform="translate(100, 44)" class="sway-element" style="animation-delay: 0s;">
    <path
      d="M-20 0 L-28 -4 L-24 14 L-16 10 L-16 40 Q-16 46 -10 46 L10 46 Q16 46 16 40 L16 10 L24 14 L28 -4 L20 0 Q14 -8 0 -8 Q-14 -8 -20 0Z"
      fill="var(--surface-container-low)"
      stroke="var(--outline-variant)"
      stroke-width="1"
    />
    <circle cx="-4" cy="18" r="1.5" fill="var(--outline-variant)" opacity="0.4" />
    <circle cx="6" cy="14" r="1.5" fill="var(--outline-variant)" opacity="0.4" />
    <circle cx="0" cy="28" r="1.5" fill="var(--outline-variant)" opacity="0.4" />
    <circle cx="-8" cy="32" r="1.5" fill="var(--outline-variant)" opacity="0.4" />
    <circle cx="8" cy="24" r="1.5" fill="var(--outline-variant)" opacity="0.4" />
    <circle cx="-2" cy="38" r="1.2" fill="var(--outline-variant)" opacity="0.3" />
    <circle cx="6" cy="36" r="1.2" fill="var(--outline-variant)" opacity="0.3" />
  </g>

  <g transform="translate(185, 34)">
    <rect x="-3" y="-6" width="6" height="14" rx="1.5" fill="var(--outline)" opacity="0.5" />
  </g>

  <g transform="translate(185, 42)" class="sway-element" style="animation-delay: 0.4s;">
    <path
      d="M-18 16 Q-18 -2 0 -6 Q18 -2 18 16"
      fill="var(--tertiary-fixed)"
      stroke="var(--tertiary-fixed-dim)"
      stroke-width="1"
    />
    <path
      d="M-20 16 Q-20 20 0 22 Q20 20 20 16"
      fill="var(--tertiary-fixed)"
      stroke="var(--tertiary-fixed-dim)"
      stroke-width="1"
    />
    <circle cx="0" cy="-6" r="3" fill="var(--tertiary-container)" />
  </g>

  <g transform="translate(230, 30) rotate(10)" class="sway-element" style="animation-delay: 0.6s;">
    <path d="M0 0 Q3 14 1 30" stroke="var(--primary-container)" stroke-width="1.5" fill="none" />
    <ellipse cx="-5" cy="10" rx="5" ry="3" fill="var(--primary-container)" opacity="0.65" transform="rotate(-25)" />
    <ellipse cx="-3" cy="20" rx="4.5" ry="3" fill="var(--primary-container)" opacity="0.5" transform="rotate(-15)" />
    <ellipse cx="5" cy="14" rx="5" ry="3" fill="var(--primary-container)" opacity="0.6" transform="rotate(20)" />
    <ellipse cx="4" cy="24" rx="4" ry="2.5" fill="var(--primary-container)" opacity="0.45" transform="rotate(10)" />
  </g>

  <g transform="translate(290, 32)">
    <rect x="-3" y="-6" width="6" height="14" rx="1.5" fill="var(--outline)" opacity="0.5" />
  </g>

  <g transform="translate(280, 40)" class="sway-element" style="animation-delay: 0.3s;">
    <path
      d="M-8 0 L-8 20 Q-8 28 -14 28 Q-18 28 -18 24 L-18 18 Q-18 16 -8 16"
      fill="var(--secondary-container)"
      stroke="var(--secondary-fixed-dim)"
      stroke-width="1"
    />
    <path
      d="M8 0 L8 20 Q8 28 14 28 Q18 28 18 24 L18 18 Q18 16 8 16"
      fill="var(--secondary-container)"
      stroke="var(--secondary-fixed-dim)"
      stroke-width="1"
    />
    <line x1="-12" y1="4" x2="-4" y2="4" stroke="var(--secondary-fixed-dim)" stroke-width="0.8" opacity="0.5" />
    <line x1="4" y1="4" x2="12" y2="4" stroke="var(--secondary-fixed-dim)" stroke-width="0.8" opacity="0.5" />
  </g>

  <g transform="translate(340, 34) rotate(-5)" class="sway-element" style="animation-delay: 0.8s;">
    <path d="M0 0 Q-2 10 0 22" stroke="var(--primary-container)" stroke-width="1.5" fill="none" />
    <ellipse cx="-5" cy="7" rx="4.5" ry="3" fill="var(--primary-container)" opacity="0.6" transform="rotate(-20)" />
    <ellipse cx="4" cy="12" rx="4" ry="2.8" fill="var(--primary-container)" opacity="0.5" transform="rotate(15)" />
    <ellipse cx="-3" cy="18" rx="3.5" ry="2.5" fill="var(--primary-container)" opacity="0.4" transform="rotate(-10)" />
  </g>
</svg>
